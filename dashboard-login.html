<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monday Mart - Sales Dashboard</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background: #0a0a0a; 
            color: #fff; 
            min-height: 100vh; 
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px; 
        }
        .login-container {
            background: #111;
            border: 1px solid #222;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .login-header h1 {
            font-size: 24px;
            margin-bottom: 8px;
        }
        .login-header .logo {
            color: #22c55e;
        }
        .login-header p {
            color: #666;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            color: #888;
            font-size: 14px;
            margin-bottom: 8px;
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: #0a0a0a;
            border: 1px solid #222;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
        }
        .form-group input:focus {
            outline: none;
            border-color: #22c55e;
        }
        .login-btn {
            width: 100%;
            padding: 14px;
            background: #22c55e;
            color: #000;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }
        .login-btn:hover {
            background: #16a34a;
        }
        .error-msg {
            color: #ef4444;
            font-size: 14px;
            text-align: center;
            margin-top: 16px;
            display: none;
        }
        .error-msg.show {
            display: block;
        }
        .back-btn {
            display: block;
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-top: 20px;
            text-decoration: none;
        }
        .back-btn:hover {
            color: #888;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1><span class="logo">Monday</span> Mart</h1>
            <p>Sales Dashboard</p>
        </div>
        <form id="loginForm">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" autocomplete="username" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" autocomplete="current-password" required>
            </div>
            <button type="submit" class="login-btn">Login</button>
            <div class="error-msg" id="errorMsg">Invalid username or password</div>
        </form>
    </div>
    
    <script>
        const CORRECT_USERNAME = 'monday';
        const CORRECT_PASSWORD = 'mart2026';
        
        // Check if already logged in
        if (localStorage.getItem('dash_auth') === 'true') {
            window.location.href = 'sales-dashboard.html';
        }
        
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            if (username === CORRECT_USERNAME && password === CORRECT_PASSWORD) {
                localStorage.setItem('dash_auth', 'true');
                window.location.href = 'sales-dashboard.html';
            } else {
                document.getElementById('errorMsg').classList.add('show');
            }
        });
        
        // Clear error on input
        document.getElementById('username').addEventListener('input', function() {
            document.getElementById('errorMsg').classList.remove('show');
        });
        document.getElementById('password').addEventListener('input', function() {
            document.getElementById('errorMsg').classList.remove('show');
        });
    </script>
</body>
</html>
