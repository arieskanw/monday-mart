<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monday Mart - Sales Dashboard</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background: #0a0a0a; 
            color: #fff; 
            min-height: 100vh; 
            padding: 20px; 
        }
        .container { max-width: 1200px; margin: 0 auto; }
        
        /* Header */
        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 30px; 
            padding-bottom: 20px;
            border-bottom: 1px solid #222;
        }
        .header h1 { font-size: 24px; }
        .header .logo { color: #22c55e; }
        .refresh-btn { 
            padding: 10px 20px; 
            background: #222; 
            color: #fff; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 14px;
        }
        .refresh-btn:hover { background: #333; }
        
        /* Stats Grid */
        .stats-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
            gap: 20px; 
            margin-bottom: 40px; 
        }
        .stat-card { 
            background: #111; 
            border: 1px solid #222; 
            border-radius: 16px; 
            padding: 24px; 
        }
        .stat-label { 
            color: #666; 
            font-size: 14px; 
            margin-bottom: 8px; 
        }
        .stat-value { 
            font-size: 36px; 
            font-weight: bold; 
        }
        .stat-value.green { color: #22c55e; }
        .stat-value.blue { color: #3b82f6; }
        .stat-value.yellow { color: #eab308; }
        
        /* Product Stats */
        .product-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .product-card {
            background: #111;
            border: 1px solid #222;
            border-radius: 16px;
            padding: 24px;
        }
        .product-card h3 {
            font-size: 16px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .product-stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .product-stat-label { color: #666; font-size: 12px; }
        .product-stat-value { font-size: 24px; font-weight: bold; margin-top: 4px; }
        
        /* Table */
        .table-card { 
            background: #111; 
            border: 1px solid #222; 
            border-radius: 16px; 
            overflow: hidden; 
        }
        .table-header { 
            padding: 20px 24px; 
            border-bottom: 1px solid #222; 
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .table-header h3 { font-size: 18px; }
        .filter-btns { display: flex; gap: 10px; }
        .filter-btn {
            padding: 8px 16px;
            background: #222;
            color: #888;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
        }
        .filter-btn.active { background: #22c55e; color: #000; }
        
        table { width: 100%; border-collapse: collapse; }
        th { 
            text-align: left; 
            padding: 14px 24px; 
            color: #666; 
            font-size: 12px; 
            text-transform: uppercase; 
            font-weight: 600; 
            border-bottom: 1px solid #222;
        }
        td { padding: 16px 24px; border-bottom: 1px solid #222; font-size: 14px; }
        tr:last-child td { border-bottom: none; }
        
        .status { 
            display: inline-block; 
            padding: 4px 12px; 
            border-radius: 20px; 
            font-size: 12px; 
            font-weight: 600; 
        }
        .status.paid { background: #22c55e; color: #000; }
        .status.pending { background: #eab308; color: #000; }
        .status.failed { background: #ef4444; color: #fff; }
        
        .product-badge {
            display: inline-block;
            padding: 4px 10px;
            background: #222;
            border-radius: 6px;
            font-size: 12px;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }
        .empty-state-icon { font-size: 48px; margin-bottom: 16px; }
        
        /* Last Updated */
        .last-updated {
            text-align: center;
            color: #444;
            font-size: 12px;
            margin-top: 20px;
        }
        
        @media (max-width: 768px) {
            .header { flex-direction: column; gap: 16px; text-align: center; }
            .stats-grid { grid-template-columns: 1fr 1fr; }
            .product-stats { grid-template-columns: 1fr; }
            table, thead, tbody, th, td, tr { display: block; }
            thead { display: none; }
            tr { margin-bottom: 16px; background: #111; border-radius: 12px; padding: 16px; }
            td { padding: 8px 0; border: none; }
            td:before { content: attr(data-label); color: #666; font-size: 11px; display: block; margin-bottom: 4px; }
        }
    </style>
</head>
<body>
    <script>
        // Check authentication
        if (localStorage.getItem('dash_auth') !== 'true') {
            window.location.href = 'dashboard-login.html';
        }
        
        function logout() {
            localStorage.removeItem('dash_auth');
            window.location.href = 'dashboard-login.html';
        }
    </script>
    
    <div class="container">
        <div class="header">
            <h1><span class="logo">Monday</span> Mart - Sales Dashboard</h1>
            <div style="display:flex;gap:10px">
                <button class="refresh-btn" onclick="loadData()">🔄 Refresh</button>
                <button class="refresh-btn" onclick="logout()" style="background:#ef4444">🚪 Logout</button>
            </div>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Total Orders</div>
                <div class="stat-value" id="totalOrders">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Total Revenue</div>
                <div class="stat-value green" id="totalRevenue">$0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Paid Orders</div>
                <div class="stat-value blue" id="paidOrders">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Pending</div>
                <div class="stat-value yellow" id="pendingOrders">0</div>
            </div>
        </div>
        
        <div class="product-stats" id="productStats">
            <!-- Product stats will be loaded here -->
        </div>
        
        <div class="table-card">
            <div class="table-header">
                <h3>Recent Orders</h3>
                <div class="filter-btns">
                    <button class="filter-btn active" onclick="filterOrders('all')">All</button>
                    <button class="filter-btn" onclick="filterOrders('paid')">Paid</button>
                    <button class="filter-btn" onclick="filterOrders('pending')">Pending</button>
                </div>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Order ID</th>
                        <th>Date</th>
                        <th>Customer</th>
                        <th>Product</th>
                        <th>Amount</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="ordersTable">
                    <!-- Orders will be loaded here -->
                </tbody>
            </table>
        </div>
        
        <div class="last-updated" id="lastUpdated"></div>
    </div>
    
    <script>
        let allOrders = [];
        
        function loadData() {
            fetch('orders.json')
                .then(response => response.json())
                .then(data => {
                    allOrders = data.orders || [];
                    updateStats();
                    renderOrders(allOrders);
                    document.getElementById('lastUpdated').textContent = 'Last updated: ' + new Date().toLocaleString();
                })
                .catch(error => {
                    console.log('No orders yet or error loading:', error);
                    document.getElementById('ordersTable').innerHTML = `
                        <tr>
                            <td colspan="6">
                                <div class="empty-state">
                                    <div class="empty-state-icon">📦</div>
                                    <p>No orders yet</p>
                                </div>
                            </td>
                        </tr>
                    `;
                });
        }
        
        function updateStats() {
            const total = allOrders.length;
            const paid = allOrders.filter(o => o.status === 'paid').length;
            const pending = allOrders.filter(o => o.status === 'pending').length;
            
            // Calculate revenue in USD
            let revenueUSD = 0;
            allOrders.filter(o => o.status === 'paid').forEach(order => {
                const amount = parseFloat(order.amount.replace(/[^0-9.]/g, ''));
                if (order.amount.includes('Rp')) {
                    revenueUSD += amount / 15000; // Approximate IDR to USD
                } else {
                    revenueUSD += amount;
                }
            });
            
            document.getElementById('totalOrders').textContent = total;
            document.getElementById('totalRevenue').textContent = '$' + revenueUSD.toFixed(2);
            document.getElementById('paidOrders').textContent = paid;
            document.getElementById('pendingOrders').textContent = pending;
            
            // Product stats
            const products = {};
            allOrders.forEach(order => {
                if (!products[order.product]) {
                    products[order.product] = { total: 0, paid: 0, revenue: 0 };
                }
                products[order.product].total++;
                if (order.status === 'paid') {
                    products[order.product].paid++;
                }
            });
            
            const productNames = {
                'prompts': '🤖 AI Prompt Collection',
                'bot': '🐍 Trading Bot Script'
            };
            
            let productHTML = '';
            for (const [key, value] of Object.entries(products)) {
                productHTML += `
                    <div class="product-card">
                        <h3>${productNames[key] || key}</h3>
                        <div class="product-stats-grid">
                            <div>
                                <div class="product-stat-label">Total Orders</div>
                                <div class="product-stat-value">${value.total}</div>
                            </div>
                            <div>
                                <div class="product-stat-label">Paid</div>
                                <div class="product-stat-value green">${value.paid}</div>
                            </div>
                        </div>
                    </div>
                `;
            }
            
            if (Object.keys(products).length > 0) {
                document.getElementById('productStats').innerHTML = productHTML;
            }
        }
        
        function renderOrders(orders) {
            if (orders.length === 0) {
                document.getElementById('ordersTable').innerHTML = `
                    <tr>
                        <td colspan="6">
                            <div class="empty-state">
                                <div class="empty-state-icon">📦</div>
                                <p>No orders yet</p>
                            </div>
                        </td>
                    </tr>
                `;
                return;
            }
            
            const sortedOrders = [...orders].sort((a, b) => new Date(b.date) - new Date(a.date));
            const recentOrders = sortedOrders.slice(0, 20);
            
            let html = '';
            recentOrders.forEach(order => {
                const productBadge = order.product === 'prompts' ? '🤖 Prompts' : '🐍 Bot';
                html += `
                    <tr>
                        <td data-label="Order ID">#${order.id}</td>
                        <td data-label="Date">${order.date}</td>
                        <td data-label="Customer">${order.name}<br><small style="color:#666">${order.email}</small></td>
                        <td data-label="Product"><span class="product-badge">${productBadge}</span></td>
                        <td data-label="Amount">${order.amount}</td>
                        <td data-label="Status"><span class="status ${order.status}">${order.status.toUpperCase()}</span></td>
                    </tr>
                `;
            });
            
            document.getElementById('ordersTable').innerHTML = html;
        }
        
        function filterOrders(status) {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            if (status === 'all') {
                renderOrders(allOrders);
            } else {
                renderOrders(allOrders.filter(o => o.status === status));
            }
        }
        
        // Load on page load
        loadData();
        
        // Auto refresh every 30 seconds
        setInterval(loadData, 30000);
    </script>
</body>
</html>
